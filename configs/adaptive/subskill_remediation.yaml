    display_name: Power Notation Basics

  int.signed_power_interpretation:
    domain: integer
    display_name: Signed Power Interpretation

  int.parenthesized_negative_base:
    domain: integer
    display_name: Parenthesized Negative Base

  int.minus_outside_power:
    domain: integer
    display_name: Minus Outside Power

  int.power_precedence_in_mixed_ops:
    domain: integer
    display_name: Power Precedence In Mixed Ops

  int.signed_power_evaluation:
    domain: integer
    display_name: Signed Power Evaluation

  int.mixed_power_arithmetic:
    domain: integer
    display_name: Mixed Power Arithmetic

  frac.add_sub:
    domain: fraction
    display_name: Fraction Addition and Subtraction

  frac.divide:
    domain: fraction
    display_name: Fraction Division

  frac.same_base_multiplication_rule:
    domain: fraction
    display_name: Same Base Multiplication Rule

  frac.power_building_from_repetition:
    domain: fraction
    display_name: Power Building From Repetition

  frac.power_of_power_rule:
    domain: fraction
